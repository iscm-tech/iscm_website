name: Deploy ISCM Website (Shared Hosting VOCHOST)

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to Github Pages
permissions: 
  contents: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "deploy-iscm-shared-hosting"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    
    steps:
      - name: Debug env availability
        run: |
          node -e "
            const keys = [
              'NEXT_PUBLIC_NEXTAUTH_SECRET',
              'NEXTAUTH_SECRET',
              'AUTH_SECRET'
            ];
        
            for (const key of keys) {
              const value = process.env[key];
              console.log(key, value ? 'exists, length=' + value.length : 'missing');
            }
          "
          env:
            NEXT_PUBLIC_NEXTAUTH_SECRET: ${{ secrets.NEXT_PUBLIC_NEXTAUTH_SECRET }}
            NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
            AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        
